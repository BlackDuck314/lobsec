#!/usr/sbin/nft -f
# lobsec egress firewall — restrict outbound connections for lobsec user
# Only allows connections to known-good destinations.
# Does NOT affect other system users (SSH, apt, etc).

table inet lobsec_egress {
    chain output {
        type filter hook output priority 0; policy accept;

        # Only filter traffic from the lobsec user (set to your lobsec UID)
        meta skuid != <lobsec-uid> accept

        # Allow loopback (gateway ↔ proxy ↔ audit)
        oifname "lo" accept

        # Allow established/related connections
        ct state established,related accept

        # Allow DNS resolution (UDP and TCP port 53)
        meta l4proto { tcp, udp } th dport 53 accept

        # Allow HTTPS to Telegram, Anthropic, Jetson (CF), and other APIs
        tcp dport 443 accept

        # Allow sovereign Ollama (non-standard port)
        ip daddr <remote-gpu-host> tcp dport 11435 accept

        # Allow SMTP (Gmail sending via STARTTLS)
        tcp dport 587 accept

        # Allow IMAP-S (Gmail inbox reading)
        tcp dport 993 accept

        # Allow NTP (time sync for certificate validation)
        udp dport 123 accept

        # Log and drop everything else from lobsec user
        log prefix "lobsec-egress-deny: " drop
    }
}
