#!/usr/sbin/nft -f
# lobsec egress firewall — per-UID egress rules for gateway and proxy
# Gateway (lobsec, uid 995): Telegram, weather, search, email
# Proxy (lobsec-proxy, uid 993): Anthropic, Jetson, Portullama
# Does NOT affect other system users (SSH, apt, etc).

table inet lobsec_egress {
    chain output {
        type filter hook output priority 0; policy accept;

        # Only filter traffic from lobsec UIDs
        # Set these to the lobsec gateway and proxy UIDs
        meta skuid != { <gateway-uid>, <proxy-uid> } accept

        # Allow loopback (gateway ↔ proxy ↔ audit)
        oifname "lo" accept

        # Allow established/related connections
        ct state established,related accept

        # Allow DNS resolution (both UIDs)
        meta l4proto { tcp, udp } th dport 53 accept

        # Dispatch to per-UID chains
        meta skuid <gateway-uid> jump gateway_egress
        meta skuid <proxy-uid> jump proxy_egress

        # Catch-all deny
        log prefix "lobsec-egress-deny: " drop
    }

    chain gateway_egress {
        tcp dport 443 accept          # Telegram, Tomorrow.io, Perplexity
        tcp dport 587 accept          # Gmail SMTP
        tcp dport 993 accept          # Gmail IMAP
        log prefix "lobsec-gw-deny: " drop
    }

    chain proxy_egress {
        tcp dport 443 accept          # Anthropic, Jetson
        ip daddr <sovereign-gpu-host> tcp dport 11435 accept  # sovereign GPU
        udp dport 123 accept          # NTP
        log prefix "lobsec-proxy-deny: " drop
    }
}
