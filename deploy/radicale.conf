# Radicale CalDAV/CardDAV server — lobsec
# Loopback only, behind security perimeter.
# Auth via htpasswd (bcrypt), password from HSM.

[server]
hosts = 127.0.0.1:5232
ssl = false

[auth]
type = htpasswd
htpasswd_filename = /opt/lobsec/config/radicale-users
htpasswd_encryption = bcrypt

[storage]
filesystem_folder = /opt/lobsec/radicale/collections

[logging]
level = info
